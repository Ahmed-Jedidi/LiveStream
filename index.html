<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Story Streamer — Immersive Media Experience</title>
  <meta name="description" content="An immersive, Instagram-style story streaming experience with seamless video and image playback, blurred backdrop, and keyboard controls.">

  <!-- Preconnect to Google Fonts for faster font loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="app">

    <!-- ── LAYER 1: Blurred Background ── -->
    <div id="background-blur" aria-hidden="true">
      <canvas id="blur-canvas" width="80" height="45"></canvas>
      <div id="blur-image"></div>
      <div id="blur-overlay"></div>
    </div>

    <!-- ── IDLE SCREEN (shown when no stories) ── -->
    <div id="idle-screen">
      <div class="idle-content">
        <div class="idle-pulse-ring">
          <div class="idle-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </div>
        </div>
        <h2 id="idle-patient-name">Waiting for stories...</h2>
        <p id="idle-subtitle">Stories from family and friends will appear here automatically</p>
        <div class="idle-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <!-- ── LAYER 2: Story Container (9:16 Aspect Ratio) ── -->
    <div id="story-container" class="hidden-story">

      <!-- Segmented Progress Bar -->
      <div id="progress-bar"></div>

      <!-- Top Gradient Overlay -->
      <div id="top-gradient" aria-hidden="true"></div>

      <!-- Media Viewport -->
      <div id="media-viewport"></div>

      <!-- Caption & Sender Overlay -->
      <div id="caption-overlay" aria-hidden="true">
        <p id="caption-sender" class="caption-sender"></p>
        <p id="caption-text" class="caption-text"></p>
      </div>

      <!-- Invisible Navigation Click Zones -->
      <div id="nav-prev" class="nav-zone" aria-label="Previous story"></div>
      <div id="nav-next" class="nav-zone" aria-label="Next story"></div>

      <!-- Unmute Button -->
      <button id="unmute-btn" aria-label="Unmute audio">
        <span class="unmute-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <line x1="23" y1="9" x2="17" y2="15"></line>
            <line x1="17" y1="9" x2="23" y2="15"></line>
          </svg>
        </span>
        <span class="unmute-text">Tap to Unmute</span>
      </button>

      <!-- Pause Indicator -->
      <div id="pause-indicator" aria-hidden="true">
        <svg width="52" height="52" viewBox="0 0 48 48" fill="rgba(255,255,255,0.95)">
          <rect x="14" y="12" width="7" height="24" rx="2"/>
          <rect x="27" y="12" width="7" height="24" rx="2"/>
        </svg>
      </div>

      <!-- Play Indicator -->
      <div id="play-indicator" aria-hidden="true">
        <svg width="52" height="52" viewBox="0 0 48 48" fill="rgba(255,255,255,0.95)">
          <polygon points="16,10 40,24 16,38"/>
        </svg>
      </div>

      <!-- Volume Indicator -->
      <div id="volume-indicator" aria-hidden="true">
        <div id="volume-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          </svg>
        </div>
        <div id="volume-bar-track">
          <div id="volume-bar-fill"></div>
        </div>
        <span id="volume-label">100%</span>
      </div>

      <!-- Menu Overlay -->
      <div id="menu-overlay">
        <div class="menu-content">
          <h2>Keyboard Shortcuts</h2>
          <div class="shortcut-grid">
            <div class="shortcut-row"><kbd>←</kbd><span>Previous Story</span></div>
            <div class="shortcut-row"><kbd>→</kbd><span>Next Story</span></div>
            <div class="shortcut-row"><kbd>↑</kbd><span>Volume Up</span></div>
            <div class="shortcut-row"><kbd>↓</kbd><span>Volume Down</span></div>
            <div class="shortcut-row"><kbd>Space</kbd><span>Play / Pause</span></div>
            <div class="shortcut-row"><kbd>M</kbd> / <kbd>#</kbd><span>Mute / Unmute</span></div>
            <div class="shortcut-row"><kbd>Enter</kbd><span>Toggle This Menu</span></div>
          </div>
          <p class="menu-hint">Press <kbd>Enter</kbd> to close</p>
        </div>
      </div>

      <!-- Bottom Gradient Overlay -->
      <div id="bottom-gradient" aria-hidden="true"></div>

    </div><!-- /#story-container -->

    <!-- Story Counter -->
    <div id="story-counter" aria-live="polite"></div>

  </div><!-- /#app -->

  <!-- Firebase SDK loaded as module for the app script -->
  <script type="module" src="app.js"></script>
</body>
</html>
